<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hensem Data Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,"Microsoft YaHei",sans-serif}
body{background:#f4f7fb;color:#122033}
.app{display:flex;min-height:100vh}
.sidebar{width:238px;background:#081426;color:#fff;position:fixed;top:0;bottom:0;left:0;padding:18px 14px;z-index:10}
.logo{display:flex;gap:12px;align-items:center;margin-bottom:28px}
.logo-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#06b6d4,#2563eb);display:grid;place-items:center;font-weight:900;font-size:13px}
.logo h2{font-size:17px}.logo p{font-size:11px;color:#8ea3c0}
.side-title{font-size:12px;color:#7488a8;margin:22px 8px 10px}
.menu{padding:14px 12px;border-radius:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;font-weight:800}
.menu:hover{background:#12223b}.menu.active{background:#1d4ed8}
.badge{font-size:11px;background:#064e3b;color:#86efac;padding:4px 8px;border-radius:999px}
.main{margin-left:238px;width:calc(100% - 238px);padding:18px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.header h1{font-size:24px}.desc{font-size:13px;color:#64748b;margin-top:6px}
.lang{display:flex;gap:6px;background:#fff;border:1px solid #dbe5f3;border-radius:16px;padding:6px}
.lang button{border:0;background:transparent;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:10px}.lang button.active{background:#eef4ff}
.modules,.subtabs,.quick,.filters,.panel{background:#fff;border:1px solid #dce7f5;border-radius:18px;box-shadow:0 8px 24px #1d4ed80b}
.modules,.subtabs{padding:10px;display:flex;gap:10px;overflow:auto;margin-bottom:12px}
.modules button,.subtabs button{border:0;background:#f8fafc;padding:11px 17px;border-radius:13px;font-weight:900;cursor:pointer;white-space:nowrap;color:#27435f}
.modules button.active,.subtabs button.active{background:#1d4ed8;color:#fff}
.filters{padding:16px;display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:12px}
.field label{display:block;font-size:12px;color:#64748b;margin-bottom:6px;font-weight:800}
.field input,.field select{width:100%;height:40px;border:1px solid #cbd5e1;border-radius:12px;padding:0 10px;background:white}
.actions{display:flex;gap:8px;align-items:end;grid-column:span 2}
.btn{border:0;padding:11px 16px;border-radius:12px;cursor:pointer;font-weight:900}
.primary{background:#2563eb;color:#fff}.light{background:#eef5ff;color:#1d4ed8}.danger{background:#fee2e2;color:#dc2626}
.quick{padding:12px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.quick span{font-size:13px;color:#64748b;font-weight:800}.quick button{border:0;background:#eef5ff;color:#1d4ed8;padding:7px 13px;border-radius:10px;font-weight:800;cursor:pointer}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.chip{background:#eef8ff;border:1px solid #ccecff;border-radius:999px;padding:6px 10px;font-size:12px;color:#28506b;font-weight:800}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:12px}
.card{background:#fff;border:1px solid #dce7f5;border-radius:16px;padding:15px;position:relative;overflow:hidden}.card:after{content:"";position:absolute;right:-18px;top:-18px;width:70px;height:70px;border-radius:50%;background:#eef4ff}
.card small{color:#64748b;font-weight:800}.card b{display:block;font-size:21px;margin-top:6px}
.panel{padding:18px}.panel h2{font-size:21px;margin-bottom:6px}
.table-top{display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px;gap:10px;flex-wrap:wrap}
.table-wrap{overflow:auto;border-top:1px solid #e2e8f0}
table{width:100%;border-collapse:collapse;min-width:1500px}
th{background:#f8fafc;color:#475569;font-size:12px;text-align:left;padding:13px;border-bottom:1px solid #e2e8f0;white-space:nowrap;cursor:pointer}
td{padding:12px;border-bottom:1px solid #e2e8f0;font-size:12px;white-space:nowrap}
tr:hover{background:#f8fbff}.warn{background:#fff1f2}
.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-weight:900;font-size:11px}.good{background:#dcfce7;color:#16a34a}.bad{background:#fee2e2;color:#dc2626}.neutral{background:#e2e8f0;color:#334155}
.barbox{display:inline-block;width:82px;height:6px;background:#e2e8f0;border-radius:999px;margin-left:6px;vertical-align:middle}.bar{display:block;height:100%;background:linear-gradient(90deg,#2563eb,#22c55e);border-radius:999px}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;color:#64748b;font-size:13px;gap:10px;flex-wrap:wrap}
.pagination{display:flex;gap:6px;align-items:center}.pagination button{border:0;background:#eef5ff;color:#1d4ed8;border-radius:9px;padding:8px 11px;font-weight:800;cursor:pointer}.pagination button:disabled{opacity:.4;cursor:not-allowed}
.loading{padding:30px;text-align:center;color:#64748b}.empty{padding:40px;text-align:center;color:#94a3b8}
.modal{display:none;position:fixed;inset:0;background:#0008;z-index:100;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}
.modal-card{background:#fff;border-radius:18px;max-width:780px;width:100%;max-height:80vh;overflow:auto;padding:20px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.modal-close{border:0;background:#fee2e2;color:#dc2626;border-radius:10px;padding:8px 12px;font-weight:900;cursor:pointer}
.detail-grid{display:grid;grid-template-columns:180px 1fr;border:1px solid #e2e8f0;border-bottom:0}.detail-grid div{padding:10px;border-bottom:1px solid #e2e8f0}.detail-grid div:nth-child(odd){background:#f8fafc;font-weight:900;color:#475569}
@media(max-width:1100px){.sidebar{display:none}.main{margin-left:0;width:100%;padding:12px}.filters{grid-template-columns:1fr 1fr}.actions{grid-column:span 2}.cards{grid-template-columns:1fr 1fr}.header{align-items:flex-start}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo"><div class="logo-icon">Data</div><div><h2>Hensem数据后台</h2><p>Hensem Data Dashboard</p></div></div>
  <div class="side-title" data-i18n="module">系统模块</div>
  <div class="menu active" onclick="setModule('withdraw')"><span>💸 <span data-i18n="withdraw">提现/自动出款统计</span></span><span class="badge" data-i18n="connected">已接入</span></div>
  <div class="menu" onclick="setModule('ticket')"><span>🎫 <span data-i18n="ticket">工单/客服</span></span><span class="badge" data-i18n="connected">已接入</span></div>
  <div class="menu" onclick="setModule('thirdparty')"><span>📊 <span data-i18n="thirdparty">三方量/费率</span></span><span class="badge" data-i18n="connected">已接入</span></div>
</aside>

<main class="main">
  <div class="header">
    <div><h1 id="pageTitle">提现/自动出款统计</h1><p class="desc" id="pageDesc">读取 Google Sheet 不同工作表数据，所有按钮可正常使用。</p></div>
    <div class="lang"><button id="zhBtn" class="active" onclick="setLang('zh')">🇨🇳</button><button id="enBtn" onclick="setLang('en')">🇺🇸</button></div>
  </div>

  .modules{
display:none;
}
  <section class="subtabs" id="subTabs"></section>

  <section class="filters">
    <div class="field"><label data-i18n="startDate">开始日期</label><input type="date" id="startDate" onchange="applyFilters()"></div>
    <div class="field"><label data-i18n="endDate">结束日期</label><input type="date" id="endDate" onchange="applyFilters()"></div>
    <div class="field"><label data-i18n="country">国家</label><select id="country" onchange="applyFilters()"><option value="">全部国家</option></select></div>
    <div class="field"><label data-i18n="platform">盘口/平台</label><select id="platform" onchange="applyFilters()"><option value="">全部平台</option></select></div>
    <div class="field"><label data-i18n="type">类型</label><select id="type" onchange="applyFilters()"><option value="">全部类型</option></select></div>
    <div class="field"><label data-i18n="operator">操作人/三方</label><select id="operator" onchange="applyFilters()"><option value="">全部</option></select></div>
    <div class="field"><label data-i18n="search">搜索</label><input id="search" placeholder="Search..." oninput="applyFilters()"></div>
    <div class="actions">
      <button class="btn primary" onclick="applyFilters()" data-i18n="query">查询</button>
      <button class="btn light" onclick="resetFilters()" data-i18n="reset">重置</button>
      <button class="btn light" onclick="loadPage()" data-i18n="reload">重新读取</button>
      <button class="btn light" onclick="exportCSV()" data-i18n="export">导出</button>
    </div>
  </section>

  <section class="quick">
    <span data-i18n="quickDate">快捷日期:</span>
    <button onclick="quickDate(0)" data-i18n="today">今天</button>
    <button onclick="quickDate(1)" data-i18n="yesterday">昨日</button>
    <button onclick="quickDate(2)" data-i18n="beforeYesterday">前日</button>
    <button onclick="quickRange(7)" data-i18n="week">本周</button>
    <button onclick="quickRange(30)" data-i18n="month">本月</button>
  </section>

  <div class="chips" id="chips"></div>
  <section class="cards" id="cards"></section>

  <section class="panel">
    <h2 id="tableTitle">数据明细</h2>
    <p class="desc" id="tableDesc">当前页面暂无数据时会显示空表，请在对应 Google Sheet 工作表填入数据。</p>

    <div class="table-top">
      <div>
        <span id="rowInfo">0 rows</span>
        <select id="pageSize" onchange="changePageSize()">
          <option value="10">每页 10</option>
          <option value="20" selected>每页 20</option>
          <option value="50">每页 50</option>
          <option value="100">每页 100</option>
        </select>
      </div>
      <div class="pagination">
        <button onclick="firstPage()" id="firstBtn">首页</button>
        <button onclick="prevPage()" id="prevBtn">上一页</button>
        <b id="pageInfo">1 / 1</b>
        <button onclick="nextPage()" id="nextBtn">下一页</button>
        <button onclick="lastPage()" id="lastBtn">末页</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr id="thead"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>
</main>
</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-head"><h3 id="modalTitle">详情</h3><button class="modal-close" onclick="closeModal()">关闭</button></div>
    <div class="detail-grid" id="modalBody"></div>
  </div>
</div>

<script>
const SPREADSHEET_ID = "1ml2n4qorPy8fnYi55Y8mmHJiQZSqRZZaBqoNJj5BiSo";

/*
Buat Google Sheet dalam file yang sama, lalu isi gid masing-masing.
Kalau belum ada data, biarkan sheet kosong dengan header saja.
*/
const SHEETS = {
  withdraw_daily: { gid:"withdraw_daily" },
  withdraw_operator: { gid:"withdraw_operator" },
  ticket_board: { gid:"ticket_board" },
  ticket_operator: { gid:"ticket_operator" },
  thirdparty_rate: { gid:"thirdparty_rate" }
};

const CONFIG = {
  withdraw:{
    title:{zh:"提现/自动出款统计",en:"Withdrawal / Auto Payout"},
    desc:{zh:"统计出款日表、操作人明细、自动/人工处理情况。",en:"Monitor daily payout, operator details, auto/manual process."},
    tabs:[
      {id:"withdraw_daily",label:{zh:"自动出款日表",en:"Auto Payout Daily"}},
      {id:"withdraw_operator",label:{zh:"提现操作人明细表",en:"Payout Operator Details"}}
    ]
  },
  ticket:{
    title:{zh:"工单/客服",en:"Ticket / Customer Service"},
    desc:{zh:"统计工单看板、平台类型、操作人处理情况。",en:"Monitor ticket board, type statistics and operators."},
    tabs:[
      {id:"ticket_board",label:{zh:"工单看板",en:"Ticket Board"}},
      {id:"ticket_operator",label:{zh:"操作人统计",en:"Operator Stats"}}
    ]
  },
  thirdparty:{
    title:{zh:"三方量/费率",en:"Third Party Volume / Fee"},
    desc:{zh:"统计三方代收、代付、手续费、昨日对比与异常提醒。",en:"Monitor provider receive/payout/fee/yesterday comparison."},
    tabs:[
      {id:"thirdparty_rate",label:{zh:"三方量费率",en:"Provider Rate"}}
    ]
  }
};

const SCHEMAS = {
  withdraw_daily:{
    title:{zh:"自动出款日表",en:"Auto Payout Daily"},
    headers:["日期","国家","平台","总提款笔数","成功","驳回","成功占比","驳回占比","自动出款","人工处理","自动占比","人工占比","平均处理时间","昨日平均处理时间","对比%","备注"],
    required:["日期","国家","平台"],
    cards:[
      ["统计天数","countRows"],["日均总笔数","avg:总提款笔数"],["人工日均笔数","avg:人工处理"],["成功率","avgPercent:成功占比"],["驳回率","avgPercent:驳回占比"]
    ]
  },
  withdraw_operator:{
    title:{zh:"提现操作人明细表",en:"Payout Operator Details"},
    headers:["日期","国家","平台","操作人","已处理","已处理占比","驳回","驳回占比","平均处理时长","昨日平均处理时间","对比%","备注"],
    required:["日期","国家","平台","操作人"],
    cards:[
      ["账号数量","unique:操作人"],["平台数量","unique:平台"],["总处理笔数","sum:已处理"],["总驳回","sum:驳回"],["平均处理时长","avgText:平均处理时长"]
    ]
  },
  ticket_board:{
    title:{zh:"工单日表",en:"Ticket Daily Board"},
    headers:["日期","国家","平台","工单类型","总数","已处理","已驳回","自动处理","人工处理","自动占比","人工占比","处理率","驳回率","备注"],
    required:["日期","国家","平台","工单类型"],
    cards:[
      ["当前总工单","sum:总数"],["已处理","sum:已处理"],["已驳回","sum:已驳回"],["自动/人工","ratio:自动处理:人工处理"],["处理率","avgPercent:处理率"]
    ]
  },
  ticket_operator:{
    title:{zh:"工单操作人统计",en:"Ticket Operator Stats"},
    headers:["日期","国家","平台","操作人","总数","已处理","已驳回","自动处理","人工处理","自动占比","人工占比","处理率","驳回率","备注"],
    required:["日期","国家","平台","操作人"],
    cards:[
      ["操作人数","unique:操作人"],["总工单","sum:总数"],["已处理","sum:已处理"],["已驳回","sum:已驳回"],["处理率","avgPercent:处理率"]
    ]
  },
  thirdparty_rate:{
    title:{zh:"三方量/费率明细",en:"Third Party Rate Details"},
    headers:["日期","国家","平台","三方","类型","业务方向","代收金额","代收笔数","代付金额","代付笔数","代收费率","代付费率","昨日代收","昨日代付","备注"],
    required:["日期","国家","平台","三方"],
    cards:[
      ["主三方","unique:三方"],["平台","unique:平台"],["代收金额","sum:代收金额"],["代付金额","sum:代付金额"],["合计笔数","sum2:代收笔数:代付笔数"]
    ]
  }
};

const I18N = {
  zh:{module:"系统模块",withdraw:"提现/自动出款统计",ticket:"工单/客服",thirdparty:"三方量/费率",connected:"已接入",startDate:"开始日期",endDate:"结束日期",country:"国家",platform:"盘口/平台",type:"类型",operator:"操作人/三方",search:"搜索",query:"查询",reset:"重置",reload:"重新读取",export:"导出",quickDate:"快捷日期:",today:"今天",yesterday:"昨日",beforeYesterday:"前日",week:"本周",month:"本月",allCountry:"全部国家",allPlatform:"全部平台",allType:"全部类型",allOperator:"全部",empty:"暂无数据，请检查 Google Sheet 是否已发布 CSV，或当前筛选条件无数据。",detail:"详情",close:"关闭"},
  en:{module:"System Modules",withdraw:"Withdrawal / Auto Payout",ticket:"Ticket / CS",thirdparty:"Third Party Volume / Fee",connected:"Connected",startDate:"Start Date",endDate:"End Date",country:"Country",platform:"Platform",type:"Type",operator:"Operator / Provider",search:"Search",query:"Search",reset:"Reset",reload:"Reload",export:"Export",quickDate:"Quick Date:",today:"Today",yesterday:"Yesterday",beforeYesterday:"Before Yesterday",week:"This Week",month:"This Month",allCountry:"All Countries",allPlatform:"All Platforms",allType:"All Types",allOperator:"All",empty:"No data. Please check Google Sheet CSV publish status or current filters.",detail:"Detail",close:"Close"}
};

let lang="zh", currentModule="withdraw", currentPage="withdraw_daily";
let rawRows=[], filteredRows=[], sortKey="", sortDir=1, page=1, pageSize=20;

function t(k){return I18N[lang][k]||k}
function $(id){return document.getElementById(id)}
function csvUrl(pageId){return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${SHEETS[pageId].gid}`}

function setLang(v){
  lang=v;
  $("zhBtn").classList.toggle("active",v==="zh");
  $("enBtn").classList.toggle("active",v==="en");
  document.querySelectorAll("[data-i18n]").forEach(el=>el.innerText=t(el.dataset.i18n));
  $("country").options[0].text=t("allCountry");
  $("platform").options[0].text=t("allPlatform");
  $("type").options[0].text=t("allType");
  $("operator").options[0].text=t("allOperator");
  renderMenus();
  renderAll();
}

function renderMenus(){
  document.querySelectorAll(".menu").forEach((m,i)=>m.classList.toggle("active",["withdraw","ticket","thirdparty"][i]===currentModule));
  $("pageTitle").innerText=CONFIG[currentModule].title[lang];
  $("pageDesc").innerText=CONFIG[currentModule].desc[lang];

  $("moduleTabs").innerHTML=Object.keys(CONFIG).map(k=>`
    <button class="${k===currentModule?'active':''}" onclick="setModule('${k}')">${CONFIG[k].title[lang]}</button>
  `).join("");

  $("subTabs").innerHTML=CONFIG[currentModule].tabs.map(x=>`
    <button class="${x.id===currentPage?'active':''}" onclick="setPage('${x.id}')">${x.label[lang]}</button>
  `).join("");
}

function setModule(m){
  currentModule=m;
  currentPage=CONFIG[m].tabs[0].id;
  renderMenus();
  loadPage();
}

function setPage(p){
  currentPage=p;
  renderMenus();
  loadPage();
}

function parseCSV(text){
  const rows=[];let row=[],cell="",quote=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c==='"'&&quote&&n==='"'){cell+='"';i++}
    else if(c==='"'){quote=!quote}
    else if(c===','&&!quote){row.push(cell.trim());cell=""}
    else if((c==='\n'||c==='\r')&&!quote){if(cell||row.length){row.push(cell.trim());rows.push(row);row=[];cell=""}}
    else cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());rows.push(row)}
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}

function normalizeRows(rows){
  if(!rows.length)return [];
  const header=rows[0].map(x=>String(x).trim());
  const schema=SCHEMAS[currentPage].headers;
  const hasHeader=schema.some(h=>header.includes(h));
  const dataRows=hasHeader?rows.slice(1):rows;
  return dataRows.map(r=>{
    const obj={};
    schema.forEach((h,i)=>{
      const idx=hasHeader?header.indexOf(h):i;
      obj[h]=idx>=0?(r[idx]||""):(r[i]||"");
    });
    return obj;
  }).filter(obj=>Object.values(obj).some(v=>String(v).trim()!==""));
}

async function loadPage(){
  $("tbody").innerHTML=`<tr><td colspan="50" class="loading">Loading...</td></tr>`;
  rawRows=[];
  try{
    if(!SPREADSHEET_ID || SPREADSHEET_ID==="ISI_ID_GOOGLE_SHEET_KAMU"){
      rawRows=[];
    }else{
      const res=await fetch(csvUrl(currentPage)+"&t="+Date.now());
      const text=await res.text();
      rawRows=normalizeRows(parseCSV(text));
    }
  }catch(e){
    rawRows=[];
  }
  sortKey="";
  page=1;
  initFilters();
  applyFilters();
}

function initFilters(){
  fillSelect("country",[...new Set(rawRows.map(r=>r["国家"]).filter(Boolean))],t("allCountry"));
  fillSelect("platform",[...new Set(rawRows.map(r=>r["平台"]).filter(Boolean))],t("allPlatform"));

  const typeValues=[...new Set(rawRows.map(r=>r["类型"]||r["工单类型"]).filter(Boolean))];
  fillSelect("type",typeValues,t("allType"));

  const opKey=currentPage==="thirdparty_rate"?"三方":"操作人";
  fillSelect("operator",[...new Set(rawRows.map(r=>r[opKey]).filter(Boolean))],t("allOperator"));
}

function fillSelect(id,arr,label){
  const el=$(id), old=el.value;
  el.innerHTML=`<option value="">${label}</option>`+arr.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
  el.value=arr.includes(old)?old:"";
}

function applyFilters(){
  const s=$("startDate").value,e=$("endDate").value,c=$("country").value,p=$("platform").value,tp=$("type").value,op=$("operator").value,q=$("search").value.toLowerCase();
  const opKey=currentPage==="thirdparty_rate"?"三方":"操作人";
  filteredRows=rawRows.filter(r=>
    (!s||String(r["日期"])>=s)&&(!e||String(r["日期"])<=e)&&
    (!c||r["国家"]===c)&&(!p||r["平台"]===p)&&
    (!tp||(r["类型"]===tp||r["工单类型"]===tp))&&
    (!op||r[opKey]===op)&&
    (!q||Object.values(r).join(" ").toLowerCase().includes(q))
  );
  page=1;
  renderAll();
}

function resetFilters(){
  ["startDate","endDate","country","platform","type","operator","search"].forEach(id=>$(id).value="");
  applyFilters();
}

function quickDate(back){
  const d=new Date();d.setDate(d.getDate()-back);
  $("startDate").value=toDate(d);$("endDate").value=toDate(d);
  applyFilters();
}
function quickRange(days){
  const e=new Date(),s=new Date();s.setDate(e.getDate()-days+1);
  $("startDate").value=toDate(s);$("endDate").value=toDate(e);
  applyFilters();
}
function toDate(d){return d.toISOString().slice(0,10)}

function renderAll(){
  renderMenus();
  renderChips();
  renderCards();
  renderTable();
}

function renderChips(){
  const arr=[];
  if($("country").value)arr.push(`${t("country")}: ${$("country").value}`);
  if($("platform").value)arr.push(`${t("platform")}: ${$("platform").value}`);
  if($("type").value)arr.push(`${t("type")}: ${$("type").value}`);
  if($("operator").value)arr.push(`${t("operator")}: ${$("operator").value}`);
  if($("startDate").value||$("endDate").value)arr.push(`${$("startDate").value||"..."} 至 ${$("endDate").value||"..."}`);
  $("chips").innerHTML=arr.map(x=>`<span class="chip">${escapeHtml(x)}</span>`).join("");
}

function renderCards(){
  const cards=SCHEMAS[currentPage].cards||[];
  $("cards").innerHTML=cards.map(([label,formula])=>`
    <div class="card"><small>${escapeHtml(label)}</small><b>${computeCard(formula)}</b></div>
  `).join("");
}

function computeCard(f){
  const parts=f.split(":");
  const type=parts[0], a=parts[1], b=parts[2];
  if(type==="countRows")return fmt(filteredRows.length);
  if(type==="unique")return fmt(new Set(filteredRows.map(r=>r[a]).filter(Boolean)).size);
  if(type==="sum")return fmt(sum(a));
  if(type==="sum2")return fmt(sum(a)+sum(b));
  if(type==="avg")return filteredRows.length?fmt(sum(a)/filteredRows.length):"0";
  if(type==="avgPercent")return avgPercent(a);
  if(type==="ratio")return `${fmt(sum(a))} / ${fmt(sum(b))}`;
  if(type==="avgText")return avgTimeText(a);
  return "-";
}

function renderTable(){
  const schema=SCHEMAS[currentPage];
  $("tableTitle").innerText=schema.title[lang];
  $("tableDesc").innerText="";
  $("thead").innerHTML=schema.headers.map(h=>`<th onclick="sortBy('${h}')">${escapeHtml(h)} ${sortKey===h?(sortDir===1?"↑":"↓"):"↕"}</th>`).join("")+`<th>${t("detail")}</th>`;

  let rows=[...filteredRows];
  if(sortKey){
    rows.sort((a,b)=>{
      const av=parseValue(a[sortKey]),bv=parseValue(b[sortKey]);
      return av>bv?sortDir:av<bv?-sortDir:0;
    });
  }

  pageSize=Number($("pageSize").value)||20;
  const totalPages=Math.max(1,Math.ceil(rows.length/pageSize));
  if(page>totalPages)page=totalPages;
  const start=(page-1)*pageSize;
  const pageRows=rows.slice(start,start+pageSize);

  $("rowInfo").innerText=`显示 ${rows.length?start+1:0} - ${Math.min(start+pageSize,rows.length)} / 共 ${rows.length} 行`;
  $("pageInfo").innerText=`${page} / ${totalPages}`;
  $("firstBtn").disabled=page<=1;$("prevBtn").disabled=page<=1;$("nextBtn").disabled=page>=totalPages;$("lastBtn").disabled=page>=totalPages;

  if(!pageRows.length){
    $("tbody").innerHTML=`<tr><td colspan="50" class="empty">${t("empty")}</td></tr>`;
    return;
  }

  $("tbody").innerHTML=pageRows.map((r,i)=>{
    const warn=isWarn(r);
    return `<tr class="${warn?'warn':''}">
      ${schema.headers.map(h=>`<td>${formatCell(h,r[h])}</td>`).join("")}
      <td><button class="btn light" onclick="showDetail(${start+i})">${t("detail")}</button></td>
    </tr>`;
  }).join("");
}

function formatCell(h,v){
  v=v??"";
  if(h.includes("占比")||h.includes("处理率")||h.includes("驳回率")||h.includes("对比")){
    const n=toNum(v);
    const cls=n<0||n>50&&h.includes("驳回")?"bad":"good";
    return `<span class="pill ${cls}">${escapeHtml(String(v))}</span>${h.includes("占比")?`<span class="barbox"><span class="bar" style="width:${Math.min(Math.abs(n),100)}%"></span></span>`:""}`;
  }
  if(isNumeric(v))return fmt(toNum(v));
  return escapeHtml(String(v));
}

function isWarn(r){
  const reject=toNum(r["驳回率"]||r["驳回占比"]);
  const compare=toNum(r["对比%"]);
  return reject>50 || compare<-30 || compare>50;
}

function sortBy(h){
  if(sortKey===h)sortDir*=-1;
  else{sortKey=h;sortDir=1}
  renderTable();
}
function changePageSize(){page=1;renderTable()}
function firstPage(){page=1;renderTable()}
function prevPage(){if(page>1)page--;renderTable()}
function nextPage(){const tp=Math.max(1,Math.ceil(filteredRows.length/pageSize));if(page<tp)page++;renderTable()}
function lastPage(){page=Math.max(1,Math.ceil(filteredRows.length/pageSize));renderTable()}

function showDetail(index){
  const rows=[...filteredRows];
  const r=rows[index];
  if(!r)return;
  $("modalTitle").innerText=t("detail");
  $("modalBody").innerHTML=Object.entries(r).map(([k,v])=>`<div>${escapeHtml(k)}</div><div>${escapeHtml(String(v||"-"))}</div>`).join("");
  $("modal").classList.add("show");
}
function closeModal(){$("modal").classList.remove("show")}

function exportCSV(){
  const headers=SCHEMAS[currentPage].headers;
  const csv=[headers,...filteredRows.map(r=>headers.map(h=>r[h]||""))].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=currentPage+"-export.csv";
  a.click();
}

function sum(k){return filteredRows.reduce((a,r)=>a+toNum(r[k]),0)}
function avgPercent(k){const vals=filteredRows.map(r=>toNum(r[k])).filter(n=>!isNaN(n));return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)+"%":"0%"}
function avgTimeText(k){const vals=filteredRows.map(r=>timeSec(r[k])).filter(Boolean);if(!vals.length)return "0秒";return secText(vals.reduce((a,b)=>a+b,0)/vals.length)}
function timeSec(v){const m=String(v||"").match(/\d+/g);if(!m)return 0;if(m.length===1)return Number(m[0]);return Number(m[0])*60+Number(m[1])}
function secText(s){s=Math.round(s);return s>=60?`${Math.floor(s/60)}分${s%60}秒`:`${s}秒`}
function toNum(v){return Number(String(v||"0").replace(/[,%秒分\s]/g,""))||0}
function isNumeric(v){return String(v).replace(/[,%.\-\s]/g,"").match(/^\d+$/)}
function parseValue(v){return isNumeric(v)||String(v).includes("%")?toNum(v):String(v||"")}
function fmt(n){return Math.round(Number(n)||0).toLocaleString("en-US")}
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}

setLang("zh");
renderMenus();
loadPage();
setInterval(loadPage,30000);
</script>
</body>
</html>
